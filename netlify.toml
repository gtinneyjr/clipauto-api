[build]
  publish = "public"
  functions = "netlify/functions"

[[redirects]]
  from = "/api/channels/*"
  to = "/.netlify/functions/channels/:splat"
  status = 200

[[redirects]]
  from = "/api/channels"
  to = "/.netlify/functions/channels"
  status = 200

[[redirects]]
  from = "/api/clips/*"
  to = "/.netlify/functions/clips/:splat"
  status = 200

[[redirects]]
  from = "/api/clips"
  to = "/.netlify/functions/clips"
  status = 200

[[redirects]]
  from = "/api/auth/*"
  to = "/.netlify/functions/auth/:splat"
  status = 200

[[redirects]]
  from = "/api/trending"
  to = "/.netlify/functions/trending"
  status = 200

[[redirects]]
  from = "/api/platforms"
  to = "/.netlify/functions/platforms"
  status = 200

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
